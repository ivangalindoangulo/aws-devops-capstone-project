name: Build and Publish image to Docker Hub
on:
  push:
    branches:
      - main
    paths:
      - "api/Dockerfile"
      - "front-end-nextjs/Dockerfile"

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: |
          docker build ./api/ -t ivangalindo/devops-qr-code-backend:latest
          docker build ./front-end-nextjs/ -t ivangalindo/devops-qr-code-frontend:latest
      - name: push image to docker hub
        run: |
          docker login -u ivangalindo -p ${{ secrets.DOCKER_HUB_TOKEN }}
          docker push ivangalindo/devops-qr-code-backend:latest
          docker push ivangalindo/devops-qr-code-frontend:latest
